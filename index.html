<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Analisador de Notas Vision Pro</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600&display=swap');

    :root {
      --color-background-primary: #f8f9fa;
      --color-background-secondary: #ffffff;
      --color-background-tertiary: #edf2f7;
      --color-text-primary: #1a1a2e;
      --color-text-secondary: #4a5568;
      --color-text-tertiary: #718096;
      --color-border-primary: #e2e8f0;
      --color-border-secondary: #cbd5e0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--color-background-primary);
      color: var(--color-text-primary);
      min-height: 100vh;
      padding: 1.5rem;
    }

    .app { max-width: 1200px; margin: 0 auto; }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .header-icon {
      width: 36px; height: 36px;
      background: #1a1a2e;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: #e8d5b7;
      font-size: 18px;
    }

    .header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
    .header p { font-size: 12px; color: var(--color-text-secondary); font-weight: 300; }

    .drop-zone {
      border: 1.5px dashed var(--color-border-secondary);
      border-radius: 16px;
      padding: 2rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--color-background-secondary);
      margin-bottom: 1rem;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: #1a1a2e;
      background: var(--color-background-tertiary);
    }

    .drop-zone i { font-size: 32px; color: var(--color-text-tertiary); margin-bottom: 8px; display: block; }
    .drop-zone .drop-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }

    #file-input { display: none; }

    .btn-upload {
      display: inline-block;
      margin-top: 12px;
      padding: 8px 20px;
      background: #1a1a2e;
      color: #e8d5b7;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      pointer-events: none;
      border: none;
    }

    .queue { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1rem; }

    .thumb {
      position: relative;
      width: 64px; height: 64px;
      border-radius: 10px;
      overflow: hidden;
      border: 0.5px solid var(--color-border-primary);
    }

    .thumb img { width: 100%; height: 100%; object-fit: cover; }

    .thumb .status {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      background: rgba(0,0,0,0.45);
      color: white;
    }

    .thumb .remove {
      position: absolute; top: 2px; right: 2px;
      width: 16px; height: 16px;
      background: rgba(0,0,0,0.6);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: white;
      font-size: 10px;
      border: none;
    }

    .btn-analyze {
      width: 100%;
      padding: 12px;
      background: #1a1a2e;
      color: #e8d5b7;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-bottom: 1.5rem;
    }
    .btn-analyze:disabled { opacity: 0.4; cursor: not-allowed; }

    .progress-bar-wrap {
      background: var(--color-background-secondary);
      border-radius: 99px;
      height: 4px;
      margin-bottom: 1.5rem;
      overflow: hidden;
      display: none;
    }
    .progress-bar-fill { height: 100%; background: #1a1a2e; width: 0%; transition: width 0.4s; }

    .dashboard { display: grid; grid-template-columns: 1fr; gap: 1.5rem; display: none; }

    @media (min-width: 900px) {
      .dashboard { grid-template-columns: 1.1fr 0.9fr; }
    }

    .panel {
      background: #fff;
      padding: 1.5rem;
      border-radius: 16px;
      border: 1px solid var(--color-border-primary);
    }

    .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }

    .total-badge {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      background: #1a1a2e;
      color: #e8d5b7;
      padding: 4px 12px;
      border-radius: 99px;
    }

    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    thead th { text-align: left; padding: 8px; color: var(--color-text-secondary); border-bottom: 0.5px solid var(--color-border-primary); text-transform: uppercase; }
    tbody tr { border-bottom: 0.5px solid var(--color-border-primary); cursor: pointer; transition: background 0.2s; }
    tbody tr:hover, tbody tr.selected { background: var(--color-background-primary); }
    tbody td { padding: 12px 8px; }

    .td-value { font-family: 'DM Mono', monospace; font-weight: 500; color: #1a1a2e; }
    
    .tag { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: 600; background: var(--color-background-tertiary); }
    .tag.recibo { background: #fff3cd; color: #856404; }
    .tag.nota { background: #d4edda; color: #155724; }
    .tag.nfce { background: #E1F5EE; color: #0F6E56; }
    .tag.erro { background: #f8d7da; color: #721c24; }

    .footer-total { display: flex; justify-content: flex-end; align-items: center; gap: 12px; margin-top: 12px; }
    .footer-total strong { font-family: 'DM Mono', monospace; font-size: 18px; }

    .img-preview-container {
      position: relative;
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--color-border-secondary);
      background: #fafafa;
    }
    .img-preview-container img { width: 100%; height: auto; display: block; }
    .spinner { animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-icon"><i class="ti ti-receipt-2"></i></div>
    <div>
      <h1>Analisador de Notas & Recibos Vision Pro</h1>
      <p>Extração avançada de comprovantes e notas estável via API</p>
    </div>
  </div>

  <div class="drop-zone" id="drop-zone">
    <i class="ti ti-photo-up"></i>
    <div class="drop-title">Arraste as fotos das notas ou clique aqui para selecionar</div>
    <button class="btn-upload">Selecionar imagens</button>
    <input type="file" id="file-input" accept="image/*" multiple>
  </div>

  <div class="queue" id="queue"></div>

  <div class="progress-bar-wrap" id="progress-wrap">
    <div class="progress-bar-fill" id="progress-bar"></div>
  </div>

  <button class="btn-analyze" id="btn-analyze" disabled onclick="analyzeAll()">
    <i class="ti ti-wand"></i> Analisar comprovantes
  </button>

  <div class="dashboard" id="dashboard">
    <div class="panel">
      <div class="results-header">
        <h2>Documentos Analisados</h2>
        <span class="total-badge" id="total-badge">R$ 0,00</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Estabelecimento</th>
            <th>Tipo</th>
            <th>Número</th>
            <th>Data</th>
            <th>Valor</th>
          </tr>
        </thead>
        <tbody id="results-body"></tbody>
      </table>
      <div class="footer-total">
        <span>Total Acumulado:</span>
        <strong id="total-value">R$ 0,00</strong>
      </div>
    </div>
  </div>
</div>

<script>
// ===================================================
// CORREÇÃO: INSIRA SUA CHAVE DA ANTHROPIC (CLAUDE) AQUI
// ===================================================
const ANTHROPIC_API_KEY = "SUA_CHAVE_DO_CLAUDE_AQUI"; 

const files = [];
let results = [];

const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const queue = document.getElementById('queue');
const btnAnalyze = document.getElementById('btn-analyze');
const progressWrap = document.getElementById('progress-wrap');
const progressBar = document.getElementById('progress-bar');
const dashboard = document.getElementById('dashboard');
const resultsBody = document.getElementById('results-body');
const totalValue = document.getElementById('total-value');
const totalBadge = document.getElementById('total-badge');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { 
  e.preventDefault(); 
  dropZone.classList.remove('drag-over'); 
  if(e.dataTransfer.files && e.dataTransfer.files.length) addFiles([...e.dataTransfer.files]);
});
fileInput.addEventListener('change', () => { if(fileInput.files.length) addFiles([...fileInput.files]); });

function addFiles(newFiles) {
  newFiles.filter(f => f.type.startsWith('image/')).forEach(f => {
    if (files.find(x => x.name === f.name && x.size === f.size)) return;
    files.push(f);
    renderThumb(f, files.length - 1);
  });
  btnAnalyze.disabled = files.length === 0;
}

function renderThumb(file, idx) {
  const url = URL.createObjectURL(file);
  const div = document.createElement('div');
  div.className = 'thumb';
  div.id = 'thumb-' + idx;
  div.innerHTML = `<img src="${url}"><button class="remove" id="rm-${idx}"><i class="ti ti-x"></i></button>`;
  queue.appendChild(div);
  document.getElementById(`rm-${idx}`).addEventListener('click', (e) => { e.stopPropagation(); removeFile(idx); });
}

function removeFile(idx) {
  files.splice(idx, 1);
  queue.innerHTML = '';
  files.forEach((f, i) => renderThumb(f, i));
  btnAnalyze.disabled = files.length === 0;
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function fmtMoney(v) {
  if (v === null || v === undefined || isNaN(v)) return 'R$ 0,00';
  return 'R$ ' + v.toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}

async function analyzeOne(file, idx) {
  const thumb = document.getElementById('thumb-' + idx);
  if (thumb) {
    const s = thumb.querySelector('.status'); if (s) s.remove();
    thumb.insertAdjacentHTML('beforeend', '<div class="status"><span class="spinner">⟳</span></div>');
  }

  const b64 = await toBase64(file);
  const mime = file.type || 'image/jpeg';

  const prompt = `Você é um extrator de dados de documentos fiscais brasileiros. Analise esta imagem e extraia os campos em JSON puro:
  {
    "estabelecimento": "nome do emissor",
    "tipo": "Recibo, NFC-e, NF-e ou RPS",
    "numero": "número identificador ou null se não tiver",
    "data": "DD/MM/AAAA",
    "valor": número decimal total
  }`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': ANTHROPIC_API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerously-allow-the-browser': 'true'
      },
      body: JSON.stringify({
        model: 'claude-3-5-sonnet-20241022',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: mime, data: b64 } },
            { type: 'text', text: prompt }
          ]
        }]
      })
    });

    const data = await resp.json();
    const text = data.content?.find(c => c.type === 'text')?.text || '{}';
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    if (thumb) { thumb.querySelector('.status')?.remove(); thumb.insertAdjacentHTML('beforeend', '<div class="status">✅</div>'); }
    return { ...parsed, _ok: true };
  } catch(e) {
    if (thumb) { thumb.querySelector('.status')?.remove(); thumb.insertAdjacentHTML('beforeend', '<div class="status">❌</div>'); }
    return { estabelecimento: file.name, tipo: 'Erro', numero: null, data: null, valor: null, _ok: false };
  }
}

async function analyzeAll() {
  btnAnalyze.disabled = true;
  btnAnalyze.innerHTML = '<i class="ti ti-loader-2 spinner"></i> Analisando...';
  progressWrap.style.display = 'block';
  resultsBody.innerHTML = '';
  results = [];

  for (let i = 0; i < files.length; i++) {
    progressBar.style.width = ((i / files.length) * 100) + '%';
    const r = await analyzeOne(files[i], i);
    results.push(r);
    renderRow(i + 1, r);
    updateTotal();
    dashboard.style.display = 'grid';
  }

  progressBar.style.width = '100%';
  setTimeout(() => { progressWrap.style.display = 'none'; }, 600);
  btnAnalyze.innerHTML = '<i class="ti ti-wand"></i> Analisar comprovantes';
  btnAnalyze.disabled = false;
}

function renderRow(n, r) {
  const tc = r.tipo ? r.tipo.toLowerCase() : '';
  const val = r.valor !== null ? `<span class="td-value">${fmtMoney(r.valor)}</span>` : '—';
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td>${n}</td>
    <td><strong>${r.estabelecimento || '—'}</strong></td>
    <td><span class="tag">${r.tipo || '—'}</span></td>
    <td>${r.numero || 'Não tem'}</td>
    <td>${r.data || '—'}</td>
    <td>${val}</td>`;
  resultsBody.appendChild(tr);
}

function updateTotal() {
  const total = results.reduce((s, r) => s + (Number(r.valor) || 0), 0);
  const fmt = fmtMoney(total);
  totalValue.textContent = fmt;
  totalBadge.textContent = fmt;
}
</script>
</body>
</html>
