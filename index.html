<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Analisador NF</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:sans-serif;background:#0a0a0f;color:#e8e8f0;min-height:100vh;display:flex;flex-direction:column;}
header{background:#13131a;border-bottom:1px solid #2a2a3a;padding:12px 20px;display:flex;align-items:center;gap:10px;}
.logo{width:28px;height:28px;background:linear-gradient(135deg,#00e5a0,#7b5cff);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#000;}
.tag{margin-left:auto;font-size:10px;color:#6b6b85;background:#1c1c26;padding:3px 8px;border-radius:20px;border:1px solid #2a2a3a;}
.tabs{display:flex;background:#13131a;border-bottom:1px solid #2a2a3a;padding:0 20px;}
.tab{padding:10px 18px;font-size:12px;cursor:pointer;color:#6b6b85;border-bottom:2px solid transparent;}
.tab.on{color:#00e5a0;border-bottom-color:#00e5a0;}
.pane{display:none;flex:1;flex-direction:column;}
.pane.on{display:flex;}
#drop{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px;border:2px dashed #2a2a3a;margin:20px;border-radius:12px;}
#drop h2{font-size:18px;font-weight:700;}
#drop p{font-size:13px;color:#6b6b85;text-align:center;line-height:1.6;}
.bverde{padding:10px 28px;background:#00e5a0;color:#000;border:none;border-radius:7px;font-weight:700;cursor:pointer;font-size:13px;}
#fila{display:none;flex-direction:column;flex:1;}
#fh{padding:14px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #2a2a3a;}
#fh h3{font-size:13px;font-weight:700;}
.bsm{padding:5px 12px;background:transparent;border:1px solid #2a2a3a;border-radius:5px;color:#6b6b85;font-size:11px;cursor:pointer;}
#ban{padding:8px 20px;background:#00e5a0;color:#000;border:none;border-radius:6px;font-weight:700;font-size:12px;cursor:pointer;margin-left:auto;}
#ban:disabled{opacity:.35;cursor:not-allowed;}
#lista{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:8px;}
.ni{background:#1c1c26;border:1px solid #2a2a3a;border-radius:8px;display:flex;align-items:center;gap:12px;padding:10px 14px;}
.ni img{width:44px;height:44px;border-radius:5px;object-fit:cover;}
.ni-info{flex:1;min-width:0;}
.ni-nome{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ni-st{font-size:10px;color:#6b6b85;margin-top:2px;}
.ni-rm{background:transparent;border:none;color:#6b6b85;cursor:pointer;font-size:16px;padding:4px;}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 7px;border-radius:10px;}
.bw{background:#1c1c26;color:#6b6b85;border:1px solid #2a2a3a;}
.bp{background:rgba(0,229,160,.1);color:#00e5a0;border:1px solid rgba(0,229,160,.3);}
.bok{background:rgba(0,229,160,.12);color:#00e5a0;}
.ber{background:rgba(255,107,53,.1);color:#ff6b35;}
.ss{width:10px;height:10px;border:1.5px solid rgba(0,229,160,.3);border-top-color:#00e5a0;border-radius:50%;animation:sp .7s linear infinite;display:inline-block;}
@keyframes sp{to{transform:rotate(360deg)}}
#pw{display:none;padding:0 20px 12px;}
#pb{height:6px;background:#00e5a0;border-radius:4px;width:0%;transition:width .3s;}
#po{background:#1c1c26;border-radius:4px;overflow:hidden;}
#pt{font-size:10px;color:#6b6b85;margin-top:4px;}
#rh{padding:14px 20px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #2a2a3a;}
#rh h3{font-size:13px;font-weight:700;}
.sp{flex:1;}
.bexp{padding:6px 14px;background:transparent;border:1px solid #2a2a3a;border-radius:5px;color:#6b6b85;font-size:11px;cursor:pointer;}
.bexp:hover{border-color:#00e5a0;color:#00e5a0;}
#rv{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:#6b6b85;font-size:12px;text-align:center;}
#tw{flex:1;overflow:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead{position:sticky;top:0;background:#13131a;z-index:1;}
th{padding:10px 14px;text-align:left;font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:#6b6b85;border-bottom:1px solid #2a2a3a;font-weight:700;white-space:nowrap;}
td{padding:9px 14px;border-bottom:1px solid #1c1c26;vertical-align:middle;}
tr:hover td{background:#13131a;}
.tm{width:36px;height:36px;border-radius:4px;object-fit:cover;border:1px solid #2a2a3a;cursor:pointer;}
.vok{color:#00e5a0;font-family:monospace;font-weight:600;}
.vno{color:#6b6b85;font-style:italic;}
.ttb{font-size:9px;padding:2px 7px;border-radius:10px;background:#1c1c26;border:1px solid #2a2a3a;color:#6b6b85;}
.bdl{padding:4px 9px;background:transparent;border:1px solid #2a2a3a;border-radius:5px;color:#6b6b85;font-size:12px;cursor:pointer;}
.bdl:hover{border-color:#00e5a0;color:#00e5a0;}
#mod{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;align-items:center;justify-content:center;padding:20px;}
#mod.on{display:flex;}
#mod img{max-width:90vw;max-height:88vh;border-radius:8px;object-fit:contain;}
#mclose{position:absolute;top:16px;right:20px;background:#1c1c26;border:1px solid #2a2a3a;border-radius:6px;color:#e8e8f0;padding:6px 14px;cursor:pointer;}
#med{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;align-items:center;justify-content:center;padding:20px;}
#med.on{display:flex;}
.ebox{background:#13131a;border:1px solid #2a2a3a;border-radius:12px;padding:24px;width:100%;max-width:480px;display:flex;flex-direction:column;gap:14px;}
.ebox h3{font-size:14px;font-weight:700;}
.ebox img{width:100%;max-height:180px;object-fit:contain;border-radius:6px;border:1px solid #2a2a3a;background:#000;}
.erow{display:flex;flex-direction:column;gap:5px;}
.erow label{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:#6b6b85;font-weight:700;}
.erow input{background:#0a0a0f;border:1px solid #2a2a3a;border-radius:6px;color:#e8e8f0;padding:8px 10px;font-size:13px;outline:none;}
.erow input:focus{border-color:#00e5a0;}
.ebtns{display:flex;gap:8px;justify-content:flex-end;}
.ecancel{padding:7px 16px;background:transparent;border:1px solid #2a2a3a;border-radius:6px;color:#6b6b85;cursor:pointer;font-size:12px;}
.esave{padding:7px 16px;background:#00e5a0;border:none;border-radius:6px;color:#000;cursor:pointer;font-size:12px;font-weight:700;}
</style>
</head>
<body>
<header>
  <div class="logo">NF</div>
  <h1 style="font-size:15px;">Analisador de Nota Fiscal</h1>
  <span class="tag">Vision + Claude</span>
</header>
<div class="tabs">
  <div class="tab on" id="t0" onclick="aba(0)">Upload</div>
  <div class="tab" id="t1" onclick="aba(1)">Resultados <span id="rc" style="display:none;background:#00e5a0;color:#000;border-radius:10px;font-size:9px;padding:1px 6px;margin-left:4px;font-weight:700;"></span></div>
</div>
<div class="pane on" id="p0">
  <input type="file" id="fi" accept="image/*" multiple style="display:none">
  <div id="drop">
    <div style="font-size:48px;opacity:.4">&#x1F9FE;</div>
    <h2>Arraste as notas aqui</h2>
    <p>JPG, PNG, WEBP</p>
    <label for="fi" class="bverde" style="cursor:pointer;display:inline-block;padding:10px 28px;">Selecionar arquivos</label>
  </div>
  <div id="fila">
    <div id="fh">
      <h3 id="fcnt">0 notas</h3>
      <label for="fi" class="bsm" style="cursor:pointer;">+ Adicionar</label>
      <button id="ban">&#9654; Analisar todas</button>
    </div>
    <div id="pw"><div id="po"><div id="pb"></div></div><div id="pt"></div></div>
    <div id="lista"></div>
  </div>
</div>
<div class="pane" id="p1">
  <div id="rh">
    <h3>Resultados</h3><div class="sp"></div>
    <button class="bexp" onclick="expCSV()">CSV</button>
    <button class="bexp" onclick="expJSON()" style="margin-left:6px;">JSON</button>
    <button class="bexp" onclick="baixarTodas()" style="margin-left:6px;">Baixar todas</button>
  </div>
  <div id="rv">Nenhuma nota analisada ainda.</div>
  <div id="tw" style="display:none;">
    <table>
      <thead><tr><th>Img</th><th>Arquivo</th><th>Tipo</th><th>Data</th><th>Numero</th><th>Valor</th><th>Status</th><th></th></tr></thead>
      <tbody id="tb"></tbody>
    </table>
  </div>
</div>
<div id="mod" onclick="fMod()">
  <button id="mclose" onclick="fMod()">Fechar</button>
  <img id="mimg" src="" alt="">
</div>
<div id="med">
  <div class="ebox">
    <h3>Editar manualmente</h3>
    <img id="eimg" src="" alt="">
    <div class="erow"><label>Data</label><input id="edata" placeholder="DD/MM/AAAA"></div>
    <div class="erow"><label>Numero</label><input id="enum2" placeholder="Deixe vazio se nao houver"></div>
    <div class="erow"><label>Valor</label><input id="eval2" placeholder="R$ 0,00"></div>
    <div class="ebtns">
      <button class="ecancel" onclick="fEd()">Cancelar</button>
      <button class="esave" onclick="sEd()">Salvar</button>
    </div>
  </div>
</div>
<script>
var VK = "AIzaSyCXA7j449mZIjNSyCr_a0OJ0zLk3Q11jIk";
var CK = ["sk-ant-api03-4r8g6O4dDF8Osk","7UTsz5CVwDgtY816v59K2qHGhZl","G0q9yDlAKmQtKu9uVOChef5kGXb","oOVSR3J7XVoAlYc8tQ-SjkwLQAA"].join("");
var notas = [];
var _editNota = null, _editIdx = null;

function aba(n) {
  document.getElementById("t0").classList.toggle("on", n===0);
  document.getElementById("t1").classList.toggle("on", n===1);
  document.getElementById("p0").classList.toggle("on", n===0);
  document.getElementById("p1").classList.toggle("on", n===1);
}
window.aba = aba;

function fMod() { document.getElementById("mod").classList.remove("on"); document.getElementById("mimg").src=""; }
window.fMod = fMod;
function fEd() { document.getElementById("med").classList.remove("on"); _editNota=null; _editIdx=null; }
window.fEd = fEd;
function sEd() {
  if (!_editNota) return;
  var data=document.getElementById("edata").value.trim();
  var num=document.getElementById("enum2").value.trim();
  var val=document.getElementById("eval2").value.trim();
  if (data) _editNota.res.data=data;
  if (num)  _editNota.res.numero=num;
  if (val)  _editNota.res.valor=val;
  var tr=document.getElementById("td-"+_editIdx)&&document.getElementById("td-"+_editIdx).closest("tr");
  if (tr) {
    var tds=tr.querySelectorAll("td");
    if (tds[3]) tds[3].textContent=_editNota.res.data||"—";
    if (tds[4]) tds[4].textContent=_editNota.res.numero||"—";
    if (tds[5]) tds[5].textContent=_editNota.res.valor||"—";
    [3,4,5].forEach(function(i){if(tds[i])tds[i].className=tds[i].textContent!=="—"?"vok":"vno";});
  }
  fEd();
}
window.sEd = sEd;

window.addEventListener("DOMContentLoaded", function() {
  var fi   = document.getElementById("fi");
  var drop = document.getElementById("drop");
  var fila = document.getElementById("fila");
  var ban  = document.getElementById("ban");

  fi.addEventListener("change", function(){if(fi.files&&fi.files.length){addFiles(fi.files);fi.value="";}});
  drop.addEventListener("dragover",  function(e){e.preventDefault();drop.classList.add("over");});
  drop.addEventListener("dragleave", function(){drop.classList.remove("over");});
  drop.addEventListener("drop", function(e){e.preventDefault();drop.classList.remove("over");addFiles(e.dataTransfer.files);});
  ban.addEventListener("click", analisarTudo);
  ban.disabled = true;

  function addFiles(files) {
    var arr=Array.from(files).filter(function(f){return f.type.startsWith("image/");});
    if (!arr.length) return;
    var done=0;
    arr.forEach(function(f){
      var reader=new FileReader();
      reader.onload=function(ev){
        notas.push({id:Date.now()+"_"+Math.random(),nome:f.name,b64:ev.target.result.split(",")[1],mime:f.type||"image/jpeg",thumb:ev.target.result,status:"wait",res:null,erro:null,_thumb:null});
        done++;
        if (done===arr.length){renderFila();drop.style.display="none";fila.style.display="flex";}
      };
      reader.readAsDataURL(f);
    });
  }

  function renderFila() {
    document.getElementById("fcnt").textContent=notas.length+(notas.length===1?" nota":" notas");
    var lista=document.getElementById("lista"); lista.innerHTML="";
    notas.forEach(function(n){
      var el=document.createElement("div"); el.className="ni"; el.id="ni-"+n.id;
      var img=document.createElement("img"); img.src=n.thumb;
      var info=document.createElement("div"); info.className="ni-info";
      info.innerHTML='<div class="ni-nome">'+n.nome+'</div><div class="ni-st" id="ns-'+n.id+'">'+badgeHTML(n)+'</div>';
      var rm=document.createElement("button"); rm.className="ni-rm"; rm.innerHTML="&#10005;";
      rm.setAttribute("data-nid",n.id);
      rm.addEventListener("click",function(){
        var nid=this.getAttribute("data-nid"); notas=notas.filter(function(x){return x.id!==nid;});
        if (!notas.length){drop.style.display="";fila.style.display="none";}else renderFila();
      });
      el.appendChild(img); el.appendChild(info); el.appendChild(rm); lista.appendChild(el);
    });
    ban.disabled=notas.length===0;
  }

  function badgeHTML(n) {
    if (n.status==="wait") return '<span class="badge bw">aguardando</span>';
    if (n.status==="proc") return '<span class="badge bp"><span class="ss"></span> processando...</span>';
    if (n.status==="ok")   return '<span class="badge bok">&#10003; concluído</span>';
    return '<span class="badge ber">&#10005; erro</span>';
  }
  function atualizarBadge(n){var el=document.getElementById("ns-"+n.id);if(el)el.innerHTML=badgeHTML(n);}

  async function analisarTudo() {
    ban.disabled=true;
    document.getElementById("pw").style.display="block";
    notas.forEach(function(n){n.status="wait";n.res=null;n.erro=null;n._thumb=null;});
    for (var i=0;i<notas.length;i++){
      var n=notas[i]; n.status="proc"; atualizarBadge(n);
      document.getElementById("pb").style.width=Math.round(i/notas.length*100)+"%";
      document.getElementById("pt").textContent="Processando "+(i+1)+" de "+notas.length+": "+n.nome;
      try{n.res=await analisarNota(n.b64,n.mime);n.status="ok";}
      catch(e){n.erro=e.message;n.status="err";}
      atualizarBadge(n);
    }
    document.getElementById("pb").style.width="100%";
    document.getElementById("pt").textContent="Concluído! "+notas.filter(function(x){return x.status==="ok";}).length+" de "+notas.length;
    ban.disabled=false;
    var okN=notas.filter(function(x){return x.status==="ok";}).length;
    var rc=document.getElementById("rc"); rc.textContent=okN; rc.style.display="inline";
    renderTabela();
  }

  // ─── helpers ──────────────────────────────────────────────────────────────
  function norm(s){return(s||"").toLowerCase().replace(/[^a-z0-9]/g,"");}
  function normS(s){return(s||"").toLowerCase().replace(/[áàâã]/g,"a").replace(/[éê]/g,"e").replace(/[íî]/g,"i").replace(/[óôõ]/g,"o").replace(/[úû]/g,"u").replace(/[ç]/g,"c");}
  var MESES={janeiro:"01",fevereiro:"02",marco:"03","março":"03",abril:"04",maio:"05",junho:"06",julho:"07",agosto:"08",setembro:"09",outubro:"10",novembro:"11",dezembro:"12"};
  function fmtD(s){var p=s.replace(/[\/\-]/g,"/").split("/");if(p.length===3){var d=p[0],m=p[1],a=p[2];if(a.length===2)a="20"+a;return d.padStart(2,"0")+"/"+m.padStart(2,"0")+"/"+a;}return s;}
  function anoOk(s){try{var p=s.replace(/[\/\-]/g,"/").split("/");var a=parseInt(p[2]||p[0]);return a>=2000&&a<=2030;}catch(e){return false;}}

  function extrairWords(vr) {
    var out=[];
    var pages=(vr&&vr.fullTextAnnotation&&vr.fullTextAnnotation.pages)||[];
    pages.forEach(function(pg){
      (pg.blocks||[]).forEach(function(bl){
        (bl.paragraphs||[]).forEach(function(pr){
          (pr.words||[]).forEach(function(wd){
            var t=(wd.symbols||[]).map(function(s){return s.text;}).join("");
            var vs=(wd.boundingBox&&wd.boundingBox.vertices)||[];
            if(t.trim()&&vs.length>=4){
              var xs=vs.map(function(v){return v.x||0;});
              var ys=vs.map(function(v){return v.y||0;});
              out.push({t:t,x1:Math.min.apply(null,xs),y1:Math.min.apply(null,ys),x2:Math.max.apply(null,xs),y2:Math.max.apply(null,ys)});
            }
          });
        });
      });
    });
    return out;
  }

  function agruparLinhas(ws) {
    var used=new Set(),ls=[];
    ws.slice().sort(function(a,b){return a.y1-b.y1;}).forEach(function(w,i){
      if(used.has(i))return;
      var l={ws:[w],y1:w.y1,y2:w.y2,x1:w.x1,x2:w.x2}; used.add(i);
      ws.forEach(function(w2,j){
        if(used.has(j))return;
        var alt=((w.y2-w.y1)+(w2.y2-w2.y1))/2;
        if(Math.abs((w.y1+w.y2)/2-(w2.y1+w2.y2)/2)<alt*0.65){
          l.ws.push(w2);l.y1=Math.min(l.y1,w2.y1);l.y2=Math.max(l.y2,w2.y2);
          l.x1=Math.min(l.x1,w2.x1);l.x2=Math.max(l.x2,w2.x2);used.add(j);
        }
      });
      l.ws.sort(function(a,b){return a.x1-b.x1;});
      l.txt=l.ws.map(function(w){return w.t;}).join(" ");
      ls.push(l);
    });
    return ls.sort(function(a,b){return a.y1-b.y1;});
  }

  // ─── análise principal ────────────────────────────────────────────────────
  async function analisarNota(b64, mime) {
    var resp=await fetch("https://vision.googleapis.com/v1/images:annotate?key="+VK,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({requests:[{image:{content:b64},features:[{type:"DOCUMENT_TEXT_DETECTION"}]}]})
    });
    if (!resp.ok) throw new Error("Vision HTTP "+resp.status);
    var json=await resp.json();
    var vr=json.responses&&json.responses[0];
    var txt=(vr&&vr.fullTextAnnotation&&vr.fullTextAnnotation.text)||"";
    var ws=extrairWords(vr);
    var ls=agruparLinhas(ws);
    if (!ws.length) throw new Error("Texto não detectado");
    var natH=Math.max.apply(null,ws.map(function(w){return w.y2;}).concat([1]));
    var nt=norm(txt);

    var tipo=nt.includes("nfce")||nt.includes("notafiscaldeconsumidor")?"NFC-e"
      :nt.includes("danfe")||nt.includes("notafiscaleletronica")?"NF-e"
      :nt.includes("nfse")?"NFS-e"
      :nt.includes("rps")||nt.includes("reciboprovisorio")?"RPS"
      :nt.includes("cupomfiscal")?"Cupom"
      :nt.includes("comprovantevenda")?"Comprovante"
      :nt.includes("recibo")?"Recibo"
      :"Documento Fiscal";

    var dataR=extData(txt,ws,ls,natH);
    var numR =extNum(tipo,txt,ws,ls,natH);
    var valR =extVal(tipo,txt,ws,ls);

    // ── FIX: Claude fallback para QUALQUER tipo com número faltando ──────────
    // Antes só era chamado para manuscritos; agora cobre NFC-e, NF-e, Doc Fiscal
    var precisaClaude = !numR || !dataR || !valR
      || tipo==="Recibo" || tipo==="Documento Fiscal";

    if (precisaClaude) {
      try {
        var cr=await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST",
          headers:{"Content-Type":"application/json","x-api-key":CK,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
          body:JSON.stringify({
            model:"claude-sonnet-4-20250514",
            max_tokens:400,
            messages:[{role:"user",content:[
              {type:"image",source:{type:"base64",media_type:mime,data:b64}},
              {type:"text",text:
                "Voce e especialista em documentos fiscais brasileiros. Analise a imagem com cuidado.\n\n" +
                "Tipo detectado: " + tipo + "\n\n" +
                "1. DATA: formato DD/MM/AAAA. Se por extenso (07 de maio de 2026 = 07/05/2026). Ano entre 2000-2030.\n" +
                "2. NUMERO do documento:\n" +
                "   - NF-e / DANFE: campo 'Nº' ou 'Número' no canto superior direito (ex: 219340)\n" +
                "   - NFC-e: campo 'CCF', 'COO', 'Nº' ou número de ordem da nota (ex: 2326)\n" +
                "   - Documento Fiscal impresso: campo 'Doc. Nº', 'Nº do Documento' ou similar\n" +
                "   - Recibo/RPS: campo 'RPS Nº', 'Recibo Nº', 'Nº' explícito\n" +
                "   - NAO use: CNPJ, CPF, CEP, código de barras, chave de acesso, protocolo, ticket, controle\n" +
                "   - Se nao houver número explícito, retorne null\n" +
                "3. VALOR: valor total pago. Após R$. Manuscrito: digito 1 parece 4.\n\n" +
                "Responda SOMENTE JSON puro sem markdown:\n" +
                "{\"data\":\"DD/MM/AAAA ou null\",\"numero\":\"string ou null\",\"valor\":\"R$ X,XX ou null\",\"data_ok\":bool,\"numero_ok\":bool,\"valor_ok\":bool}"
              }

  // ─── extData ──────────────────────────────────────────────────────────────
  function extData(txt,ws,ls,natH){

    if(mE){var nm=mE[2].substring(0,4);var mesEntry=Object.entries(MESES).find(function(kv){return kv[0].startsWith(nm)||kv[0]===mE[2];});var mes=MESES[mE[2]]||(mesEntry&&mesEntry[1]);if(mes){var ano=mE[3].length===2?"20"+mE[3]:mE[3];if(anoOk("01/01/"+ano)){var lDia=ls.find(function(l){return /\d{1,2}\s+de\s+/i.test(l.txt);});return{v:mE[1].padStart(2,"0")+"/"+mes+"/"+ano,bbox:lDia?{x1:lDia.x1,y1:lDia.y1,x2:lDia.x2,y2:lDia.y2}:null};}}}

  // ─── extNum (REESCRITA) ────────────────────────────────────────────────────
  function extNum(tipo, txt, ws, ls, natH) {
    // tokens que NUNCA são número do documento
    var bad=["cpf","cnpj","cep","protocolo","autorizacao","chavedeacesso","versao",
             "terminal","permanencia","validade","patio","fone","telefone","tributos",
             "saldo","ticket","controle","seq0","seqnr","serie","serie/subse"];

    function okN(t){var d=t.replace(/[^0-9]/g,"");return d.length>=3&&d.length<=9&&d.length!==11&&d.length!==14;}
    function numW(str){return str.replace(/\./g,"").replace(/^0+/,"").replace(/[^0-9]/g,"");}

    var i,l,n,m,w;

    // ── 1. NF-e / DANFE ─────────────────────────────────────────────────────
    if (tipo==="NF-e") {
      // padrões: "Nº 219340", "N.º 219340", "Número: 219340", "NF-e nº 219340"
      // também: linha com "NÚMERO" seguida do número na linha seguinte
      var reNFe = [
        /N[°º\.]\s*\.?\s*(\d{3,9})\b/i,
        /N[uú]mero\s*[:\-]?\s*(\d{3,9})\b/i,
        /NF\s*[-–]?\s*e\s+n[°º]?\s*\.?\s*(\d{3,9})\b/i,
        /\bNo\.?\s+(\d{3,9})\b/i
      ];
      for (var ri=0;ri<reNFe.length;ri++){
        m=txt.match(reNFe[ri]);
        if(m&&okN(m[1])){
          var nd=m[1];
          w=ws.find(function(w){return w.t.replace(/[^0-9]/g,"")===nd;});
          return{v:nd,bbox:w?{x1:w.x1,y1:w.y1,x2:w.x2,y2:w.y2}:null};
        }
      }
      // Label "NÚMERO" ou "Nº" em linha separada, número na próxima linha
      for(i=0;i<ls.length-1;i++){
        n=norm(ls[i].txt);
        if(n==="numero"||n==="no"||n==="n"||n.endsWith("numero")){
          var nx=ls[i+1];
          if(nx){m=nx.txt.trim().match(/^(\d{3,9})$/);if(m&&okN(m[1]))return{v:m[1],bbox:{x1:nx.x1,y1:nx.y1,x2:nx.x2,y2:nx.y2}};}
        }
      }
    }

    // ── 2. NFS-e ─────────────────────────────────────────────────────────────
    if (tipo==="NFS-e") {
      m=txt.match(/NFS\s*-?\s*e\s+n[°º]?\s*\.?\s*(\d{3,9})\b/i)
        ||txt.match(/N[°º]\s*(\d{3,9})\b/i)
        ||txt.match(/N[uú]mero\s*[:\-]?\s*(\d{3,9})\b/i);
      if(m&&okN(m[1])){w=ws.find(function(w){return w.t.replace(/[^0-9]/g,"")===m[1];});return{v:m[1],bbox:w?{x1:w.x1,y1:w.y1,x2:w.x2,y2:w.y2}:null};}
    }

    // ── 3. NFC-e ─────────────────────────────────────────────────────────────
    if (tipo==="NFC-e") {
      // CCF = Contador de Cupom Fiscal, COO = Contador de Ordem de Operação
      // "Nº XXXXXX" ou "NFC-e Nº" ou número de série do cupom
      var reNFCe=[
        /CCF[:\s]+(\d{3,9})\b/i,
        /COO[:\s]+(\d{3,9})\b/i,
        /NFC\s*-?\s*e\s+n[°º]?\s*\.?\s*(\d{3,9})\b/i,
        /N[°º]\s*(\d{3,9})\b/i,
        /Nro[\.:\s]+(\d{3,9})\b/i,
        /n[uú]mero\s*[:\-]?\s*(\d{3,9})\b/i
      ];
      for(var ri2=0;ri2<reNFCe.length;ri2++){
        m=txt.match(reNFCe[ri2]);
        if(m&&okN(m[1])){w=ws.find(function(w){return w.t.replace(/[^0-9]/g,"")===m[1];});return{v:m[1],bbox:w?{x1:w.x1,y1:w.y1,x2:w.x2,y2:w.y2}:null};}
      }
    }

    // ── 4. RPS ───────────────────────────────────────────────────────────────
    if (tipo==="RPS") {
      m=txt.match(/RPS\s+n[°º]?\s*\.?\s*(\d{3,9})\b/i)
        ||txt.match(/N[°º]\s*(\d{3,9})\b/i)
        ||txt.match(/n[uú]mero\s*[:\-]?\s*(\d{3,9})\b/i);
      if(m&&okN(m[1])){w=ws.find(function(w){return w.t.replace(/[^0-9]/g,"")===m[1];});return{v:m[1],bbox:w?{x1:w.x1,y1:w.y1,x2:w.x2,y2:w.y2}:null};}
    }

    // ── 5. Documento Fiscal genérico ─────────────────────────────────────────
    if (tipo==="Documento Fiscal"||tipo==="Cupom"||tipo==="Comprovante") {
      var reDoc=[
        /Doc\.?\s*N[°º]?\s*[:\-]?\s*(\d{3,9})\b/i,
        /N[°º]\s*\.?\s*(\d{3,9})\b/i,
        /n[uú]mero\s+do\s+documento\s*[:\-]?\s*(\d{3,9})\b/i,
        /n[uú]mero\s*[:\-]?\s*(\d{3,9})\b/i,
        /Extrato\s+N[°º]?\s*[:\-]?\s*(\d{3,9})\b/i
      ];
      for(var ri3=0;ri3<reDoc.length;ri3++){
        m=txt.match(reDoc[ri3]);
        if(m&&okN(m[1])){w=ws.find(function(w){return w.t.replace(/[^0-9]/g,"")===m[1];});return{v:m[1],bbox:w?{x1:w.x1,y1:w.y1,x2:w.x2,y2:w.y2}:null};}
      }
    }

    // ── 6. Busca por label genérica em linhas (fallback) ─────────────────────
    var labs=["nfcen","nfce","rpsnumero","nfsn","nfs","opp","invoice","extrato","recibono","documentono","docno"];
    for(i=0;i<ls.length;i++){
      l=ls[i]; n=norm(l.txt);
      if(bad.some(function(b){return n.includes(b);}))continue;
      if(!labs.some(function(b){return n.includes(b);}))continue;
      var ws2=l.ws.filter(function(w){var d=w.t.replace(/[^0-9]/g,"").length;return d>=3&&d<=9&&d!==11&&d!==14&&/^[\d][\d.\-]*[\d]$/.test(w.t);});
      if(ws2.length){w=ws2[0];var vn=w.t.replace(/\./g,"").replace(/^0+/,"");return{v:vn||w.t,bbox:{x1:w.x1,y1:w.y1,x2:w.x2,y2:w.y2}};}
      // número pode estar na linha seguinte
      var lnxt=ls[i+1];
      if(lnxt){m=lnxt.txt.trim().match(/^(\d{3,9})$/);if(m&&okN(m[1]))return{v:m[1],bbox:{x1:lnxt.x1,y1:lnxt.y1,x2:lnxt.x2,y2:lnxt.y2}};}
    }

    return null;
  }

  // ─── extVal ───────────────────────────────────────────────────────────────
  function extVal(tipo,txt,ws,ls){
    var bad=["identificacao","mov.","saldodevedor","desconto","troco","tributos"];
    function nV(t){return t.replace(/^R\$\s*/i,"").trim().replace(".",",");}
    function isOk(t){var v=nV(t);if(!v||v==="0,00"||v==="0.00"||v==="0")return false;return /\d+[,.]\d{2}/.test(v)||/^\d{1,6}$/.test(v);}
    function aV(l){
      var i,n,a;
      for(i=0;i<l.ws.length-1;i++){if(/^R\$$/i.test(l.ws[i].t)){n=l.ws[i+1];if(n&&/\d/.test(n.t)&&isOk(n.t)){a=l.ws[i];return{v:"R$ "+nV(n.t),bbox:{x1:a.x1,y1:Math.min(a.y1,n.y1),x2:n.x2,y2:Math.max(a.y2,n.y2)}};}}}
      var w1=l.ws.find(function(w){return /^R\$\d/.test(w.t);});
      if(w1)return{v:"R$ "+nV(w1.t.replace(/^R\$/i,"")),bbox:{x1:w1.x1,y1:w1.y1,x2:w1.x2,y2:w1.y2}};
      var w2=l.ws.find(function(w){return /^\d+[,.]\d{2}$/.test(w.t)&&isOk(w.t);});
      if(w2)return{v:"R$ "+nV(w2.t),bbox:{x1:w2.x1,y1:w2.y1,x2:w2.x2,y2:w2.y2}};
      return null;
    }
    var i,l,n,v,m;
    if(tipo==="NF-e"||tipo==="NFS-e"){m=txt.match(/[Vv][\s.]*[Tt]otal[\s\S]{0,40}?([\d]{1,3}(?:[.,][\d]{3})*[.,][\d]{2})/);if(m){var vStr=m[1],vNum=parseFloat(vStr.replace(/\./g,"").replace(",","."));if(vNum>0){var ww=ws.find(function(w){return w.t.replace(/[^0-9]/g,"")===vStr.replace(/[^0-9]/g,"");});return{v:"R$ "+vStr,bbox:ww?{x1:ww.x1,y1:ww.y1,x2:ww.x2,y2:ww.y2}:null};}}}
    var labs=["valortotal","totalapagar","valorapagar","valortotaldaos","totaldaos","totalpago","totalvenda","apagar","valor:","ticketpago","total:","quantia","totestadia"];
    for(i=0;i<ls.length;i++){l=ls[i];n=norm(l.txt);if(bad.some(function(b){return n.includes(b);}))continue;var tem=labs.some(function(b){return n.includes(b);});var srcs=tem?[l,ls[i+1]].filter(Boolean):[l];for(var si=0;si<srcs.length;si++){var s=srcs[si];if(!s||bad.some(function(b){return norm(s.txt).includes(b);}))continue;v=aV(s);if(v&&tem)return v;}}
    for(i=0;i<ls.length;i++){l=ls[i];if(/^R\$$/.test(l.txt.trim())&&ls[i+1]){var nx=ls[i+1];m=nx.txt.trim().match(/^(\d+[,.]?\d*)$/);if(m&&parseFloat(m[1].replace(",","."))>0){var v2=m[1].includes(",")||m[1].includes(".")?m[1]:m[1]+",00";return{v:"R$ "+v2,bbox:{x1:Math.min(l.x1,nx.x1),y1:l.y1,x2:Math.max(l.x2,nx.x2),y2:nx.y2}};}}for(var wi=0;wi<l.ws.length-1;wi++){if(/^R\$$/i.test(l.ws[wi].t)&&/^\d+$/.test((l.ws[wi+1]&&l.ws[wi+1].t)||"")){var b2=l.ws[wi+1];if(parseInt(b2.t)>0)return{v:"R$ "+b2.t+",00",bbox:{x1:l.ws[wi].x1,y1:Math.min(l.ws[wi].y1,b2.y1),x2:b2.x2,y2:Math.max(l.ws[wi].y2,b2.y2)}};}}}
    for(i=0;i<ls.length;i++){l=ls[i];if(bad.some(function(b){return norm(l.txt).includes(b);}))continue;v=aV(l);if(v)return v;}
    return null;
  }

  // ─── thumb anotada ────────────────────────────────────────────────────────
  function gerarThumb(src,r,cb){
    if(!r||(!r.dataBbox&&!r.numeroBbox&&!r.valorBbox)){cb(src);return;}
    var img=new Image(); img.onload=function(){
      var cv2=document.createElement("canvas"); cv2.width=img.naturalWidth; cv2.height=img.naturalHeight;
      var cx=cv2.getContext("2d"); cx.drawImage(img,0,0);
      [{bbox:r.dataBbox,cor:"#00e5a0"},{bbox:r.numeroBbox,cor:"#7b5cff"},{bbox:r.valorBbox,cor:"#ff6b35"}].forEach(function(item){
        if(!item.bbox)return;
        var x1=item.bbox.x1,y1=item.bbox.y1,x2=item.bbox.x2,y2=item.bbox.y2,ww=x2-x1,hh=y2-y1,p=Math.max(2,hh*0.12);
        cx.save(); cx.globalCompositeOperation="multiply"; cx.fillStyle=item.cor+"CC";
        cx.beginPath(); cx.roundRect(x1-p,y1-p,ww+p*2,hh+p*2,3); cx.fill();
        cx.globalCompositeOperation="source-over"; cx.strokeStyle=item.cor; cx.lineWidth=Math.max(1.5,img.naturalWidth*0.002);
        cx.beginPath(); cx.roundRect(x1-p,y1-p,ww+p*2,hh+p*2,3); cx.stroke(); cx.restore();
      });
      cb(cv2.toDataURL("image/jpeg",0.92));
    }; img.src=src;
  }

    var rows=[["Arquivo","Tipo","Data","Número","Valor"]].concat(ok.map(function(n){return[n.nome,n.res.tipo||"",n.res.data||"",n.res.numero||"",n.res.valor||""];}));
    var csv=rows.map(function(r){return r.map(function(v){return'"'+String(v).replace(/"/g,'""')+'"';}).join(",");}).join("\n");
    var a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"}));a.download="notas_fiscais.csv";a.click();
  };
  window.expJSON=function(){
    navigator.clipboard.writeText(JSON.stringify(notas.filter(function(n){return n.status==="ok";}).map(function(n){return{arquivo:n.nome,tipo:n.res.tipo,data:n.res.data,numero:n.res.numero,valor:n.res.valor};}),null,2)).then(function(){alert("JSON copiado!");});
  };
});
</script>
</body>
</html>
