<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Analisador NF</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:sans-serif;background:#0a0a0f;color:#e8e8f0;min-height:100vh;display:flex;flex-direction:column;}
header{background:#13131a;border-bottom:1px solid #2a2a3a;padding:12px 20px;display:flex;align-items:center;gap:10px;}
.logo{width:28px;height:28px;background:linear-gradient(135deg,#00e5a0,#7b5cff);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#000;}
.tag{margin-left:auto;font-size:10px;color:#6b6b85;background:#1c1c26;padding:3px 8px;border-radius:20px;border:1px solid #2a2a3a;}
.tabs{display:flex;background:#13131a;border-bottom:1px solid #2a2a3a;padding:0 20px;}
.tab{padding:10px 18px;font-size:12px;cursor:pointer;color:#6b6b85;border-bottom:2px solid transparent;}
.tab.on{color:#00e5a0;border-bottom-color:#00e5a0;}
.pane{display:none;flex:1;flex-direction:column;min-height:0;}
.pane.on{display:flex;}
#dropZone{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px;border:2px dashed #2a2a3a;margin:20px;border-radius:12px;cursor:pointer;}
#dropZone:hover,#dropZone.over{border-color:#00e5a0;background:#0d1a14;}
#dropZone h2{font-size:18px;font-weight:700;}
#dropZone p{font-size:13px;color:#6b6b85;text-align:center;line-height:1.6;}
.btn-verde{padding:10px 28px;background:#00e5a0;color:#000;border:none;border-radius:7px;font-weight:700;cursor:pointer;font-size:13px;}
#filaDiv{display:none;flex-direction:column;flex:1;min-height:0;}
#filaHeader{padding:14px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #2a2a3a;}
#filaHeader h3{font-size:13px;font-weight:700;}
.btn-sm{padding:5px 12px;background:transparent;border:1px solid #2a2a3a;border-radius:5px;color:#6b6b85;font-size:11px;cursor:pointer;}
#btnAnalisar{padding:8px 20px;background:#00e5a0;color:#000;border:none;border-radius:6px;font-weight:700;font-size:12px;cursor:pointer;margin-left:auto;}
#btnAnalisar:disabled{opacity:.35;cursor:not-allowed;}
#listaNota{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:8px;}
.ni{background:#1c1c26;border:1px solid #2a2a3a;border-radius:8px;display:flex;align-items:center;gap:12px;padding:10px 14px;}
.ni img{width:44px;height:44px;border-radius:5px;object-fit:cover;border:1px solid #2a2a3a;}
.ni-info{flex:1;min-width:0;}
.ni-nome{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ni-st{font-size:10px;color:#6b6b85;margin-top:2px;}
.ni-rm{background:transparent;border:none;color:#6b6b85;cursor:pointer;font-size:16px;}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 7px;border-radius:10px;}
.w{background:#1c1c26;color:#6b6b85;border:1px solid #2a2a3a;}
.p{background:rgba(0,229,160,.1);color:#00e5a0;border:1px solid rgba(0,229,160,.3);}
.ok{background:rgba(0,229,160,.12);color:#00e5a0;}
.er{background:rgba(255,107,53,.1);color:#ff6b35;}
.ss{width:10px;height:10px;border:1.5px solid rgba(0,229,160,.3);border-top-color:#00e5a0;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg)}}
#progWrap{display:none;padding:0 20px 12px;}
#progBar{height:6px;background:#00e5a0;border-radius:4px;width:0%;transition:width .3s;}
#progOut{background:#1c1c26;border-radius:4px;overflow:hidden;}
#progTxt{font-size:10px;color:#6b6b85;margin-top:4px;}
#resHeader{padding:14px 20px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #2a2a3a;}
#resHeader h3{font-size:13px;font-weight:700;}
.sp{flex:1;}
.btn-exp{padding:6px 14px;background:transparent;border:1px solid #2a2a3a;border-radius:5px;color:#6b6b85;font-size:11px;cursor:pointer;}
.btn-exp:hover{border-color:#00e5a0;color:#00e5a0;}
#resVazio{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:#6b6b85;font-size:12px;text-align:center;}
#tabelaWrap{flex:1;overflow:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead{position:sticky;top:0;background:#13131a;z-index:1;}
th{padding:10px 14px;text-align:left;font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:#6b6b85;border-bottom:1px solid #2a2a3a;font-weight:700;white-space:nowrap;}
td{padding:9px 14px;border-bottom:1px solid #1c1c26;vertical-align:middle;}
tr:hover td{background:#13131a;}
.tm{width:36px;height:36px;border-radius:4px;object-fit:cover;border:1px solid #2a2a3a;cursor:pointer;}
.tm:hover{border-color:#00e5a0;}
.vok{color:#00e5a0;font-family:monospace;font-weight:600;}
.vno{color:#6b6b85;font-style:italic;}
.tb{font-size:9px;padding:2px 7px;border-radius:10px;background:#1c1c26;border:1px solid #2a2a3a;color:#6b6b85;}
.btn-dl{padding:4px 9px;background:transparent;border:1px solid #2a2a3a;border-radius:5px;color:#6b6b85;font-size:12px;cursor:pointer;}
.btn-dl:hover{border-color:#00e5a0;color:#00e5a0;}
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;align-items:center;justify-content:center;padding:20px;}

#modalEdit.on{display:flex;}
.edit-box{background:#13131a;border:1px solid #2a2a3a;border-radius:12px;padding:24px;width:100%;max-width:480px;display:flex;flex-direction:column;gap:14px;}
.edit-box h3{font-size:14px;font-weight:700;}
.edit-box img{width:100%;max-height:180px;object-fit:contain;border-radius:6px;border:1px solid #2a2a3a;background:#000;}
.edit-row{display:flex;flex-direction:column;gap:5px;}
.edit-row label{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:#6b6b85;font-weight:700;}
.edit-row input{background:#0a0a0f;border:1px solid #2a2a3a;border-radius:6px;color:#e8e8f0;padding:8px 10px;font-size:13px;outline:none;}
.edit-row input:focus{border-color:#00e5a0;}
.edit-btns{display:flex;gap:8px;justify-content:flex-end;}
.edit-cancel{padding:7px 16px;background:transparent;border:1px solid #2a2a3a;border-radius:6px;color:#6b6b85;cursor:pointer;font-size:12px;}
.edit-save{padding:7px 16px;background:#00e5a0;border:none;border-radius:6px;color:#000;cursor:pointer;font-size:12px;font-weight:700;}
</style>

<input type="file" id="fileInput" accept="image/*" multiple style="display:none">
<script>
var VK = "AIzaSyCXA7j449mZIjNSyCr_a0OJ0zLk3Q11jIk";
var CK = ["sk-ant-api03-4r8g6O4dDF8Osk","7UTsz5CVwDgtY816v59K2qHGhZl","G0q9yDlAKmQtKu9uVOChef5kGXb","oOVSR3J7XVoAlYc8tQ-SjkwLQAA"].join("");
var notas = [];
var _editNota = null, _editIdx = null;

// Elementos
var fileInput = document.getElementById("fileInput");
var dropZone = document.getElementById("dropZone");
var filaDiv = document.getElementById("filaDiv");
var listaNota = document.getElementById("listaNota");
var filaCnt = document.getElementById("filaCnt");
var btnAnalisar = document.getElementById("btnAnalisar");
var progWrap = document.getElementById("progWrap");
var progBar = document.getElementById("progBar");
var progTxt = document.getElementById("progTxt");
var tbody = document.getElementById("tbody");
var tabelaWrap = document.getElementById("tabelaWrap");
var resVazio = document.getElementById("resVazio");
var resCnt = document.getElementById("resCnt");

// Botões
document.getElementById("btnSel").addEventListener("click", function(e) {
  e.stopPropagation();
  fileInput.click();
});
document.getElementById("btnAdd").addEventListener("click", function(e) {
  e.stopPropagation();
  fileInput.click();
});
fileInput.addEventListener("change", function(e) {
  if (e.target.files && e.target.files.length > 0) {
    addFiles(e.target.files);
  }
  fileInput.value = "";
});
dropZone.addEventListener("dragover", function(e) { e.preventDefault(); dropZone.classList.add("over"); });
dropZone.addEventListener("dragleave", function() { dropZone.classList.remove("over"); });
dropZone.addEventListener("drop", function(e) { e.preventDefault(); dropZone.classList.remove("over"); addFiles(e.dataTransfer.files); });

function aba(n) {
  document.getElementById("tabUp").classList.toggle("on", n===0);
  document.getElementById("tabRes").classList.toggle("on", n===1);
  document.getElementById("paneUp").classList.toggle("on", n===0);
  document.getElementById("paneRes").classList.toggle("on", n===1);
}

function addFiles(files) {
  var arr = Array.from(files).filter(function(f) { return f.type.startsWith("image/"); });
  if (!arr.length) return;
  var done = 0;
  arr.forEach(function(f) {
    var r = new FileReader();
    r.onload = function(ev) {
      notas.push({
        id: Date.now() + Math.random(),
        nome: f.name,
        b64: ev.target.result.split(",")[1],
        mime: f.type || "image/jpeg",
        thumb: ev.target.result,
        status: "wait",
        res: null,
        erro: null,
        _thumb: null
      });
      done++;
      if (done === arr.length) {
        renderFila();
        dropZone.style.display = "none";
        filaDiv.style.display = "flex";
      }
    };
    r.readAsDataURL(f);
  });
}

function renderFila() {
  filaCnt.textContent = notas.length + (notas.length === 1 ? " nota" : " notas");
  listaNota.innerHTML = "";
  notas.forEach(function(n) {
    var el = document.createElement("div");
    el.className = "ni";
    el.id = "ni-" + n.id;
    el.innerHTML = '<img src="' + n.thumb + '"><div class="ni-info"><div class="ni-nome">' + n.nome + '</div><div class="ni-st" id="ns-' + n.id + '">' + badgeHTML(n) + '</div></div><button class="ni-rm" onclick="remover('' + n.id + '')">&#10005;</button>';
    listaNota.appendChild(el);
  });
  btnAnalisar.disabled = notas.length === 0;
}

function badgeHTML(n) {
  if (n.status === "wait") return '<span class="badge w">aguardando</span>';
  if (n.status === "proc") return '<span class="badge p"><span class="ss"></span> processando...</span>';
  if (n.status === "ok") return '<span class="badge ok">&#10003; concluído</span>';
  return '<span class="badge er">&#10005; erro</span>';
}

function remover(id) {
  notas = notas.filter(function(n) { return n.id != id; });
  if (!notas.length) { dropZone.style.display = "flex"; filaDiv.style.display = "none"; }
  else renderFila();
}

function atualizarBadge(n) {
  var el = document.getElementById("ns-" + n.id);
  if (el) el.innerHTML = badgeHTML(n);
}

async function analisarTudo() {
  btnAnalisar.disabled = true;
  progWrap.style.display = "block";
  notas.forEach(function(n) { n.status = "wait"; n.res = null; n.erro = null; n._thumb = null; });
  for (var i = 0; i < notas.length; i++) {
    var n = notas[i];
    n.status = "proc"; atualizarBadge(n);
    progBar.style.width = Math.round(i / notas.length * 100) + "%";
    progTxt.textContent = "Processando " + (i+1) + " de " + notas.length + ": " + n.nome;
    try { n.res = await analisarNota(n.b64, n.mime); n.status = "ok"; }
    catch(e) { n.erro = e.message; n.status = "err"; }
    atualizarBadge(n);
  }
  progBar.style.width = "100%";
  progTxt.textContent = "Concluído! " + notas.filter(function(n){return n.status==="ok";}).length + " de " + notas.length;
  btnAnalisar.disabled = false;
  var okCount = notas.filter(function(n){return n.status==="ok";}).length;
  resCnt.textContent = okCount; resCnt.style.display = "inline";
  renderTabela();
}

// Helpers OCR
function norm(s) { return (s||"").toLowerCase().replace(/[^a-z0-9]/g,""); }
function normS(s) { return (s||"").toLowerCase().replace(/[áàâã]/g,"a").replace(/[éê]/g,"e").replace(/[íî]/g,"i").replace(/[óôõ]/g,"o").replace(/[úû]/g,"u").replace(/[ç]/g,"c"); }
var MESES = {janeiro:"01",fevereiro:"02",marco:"03","março":"03",abril:"04",maio:"05",junho:"06",julho:"07",agosto:"08",setembro:"09",outubro:"10",novembro:"11",dezembro:"12"};
function fmtData(s) {
  var p = s.replace(/[\/\-]/g,"/").split("/");
  if (p.length===3) { var d=p[0],m=p[1],a=p[2]; if(a.length===2)a="20"+a; return d.padStart(2,"0")+"/"+m.padStart(2,"0")+"/"+a; }
  return s;
}
function anoOk(s) { try { var p=s.replace(/[\/\-]/g,"/").split("/"); var a=parseInt(p[2]||p[0]); return a>=2000&&a<=2030; } catch(e){return false;} }

function extrairWords(vr) {
  var out = [];
  ((vr&&vr.fullTextAnnotation&&vr.fullTextAnnotation.pages)||[]).forEach(function(pg){
    (pg.blocks||[]).forEach(function(bl){
      (bl.paragraphs||[]).forEach(function(pr){
        (pr.words||[]).forEach(function(wd){
          var t = (wd.symbols||[]).map(function(s){return s.text;}).join("");
          var vs = (wd.boundingBox&&wd.boundingBox.vertices)||[];
          if (t.trim()&&vs.length>=4) {
            var xs=vs.map(function(v){return v.x||0;}), ys=vs.map(function(v){return v.y||0;});
            out.push({t:t,x1:Math.min.apply(null,xs),y1:Math.min.apply(null,ys),x2:Math.max.apply(null,xs),y2:Math.max.apply(null,ys)});
          }
        });
      });
    });
  });
  return out;
}

function agruparLinhas(ws) {
  var used = new Set(), ls = [];
  ws.slice().sort(function(a,b){return a.y1-b.y1;}).forEach(function(w,i){
    if (used.has(i)) return;
    var l = {ws:[w],y1:w.y1,y2:w.y2,x1:w.x1,x2:w.x2}; used.add(i);
    ws.forEach(function(w2,j){
      if (used.has(j)) return;
      var alt = ((w.y2-w.y1)+(w2.y2-w2.y1))/2;
      if (Math.abs((w.y1+w.y2)/2-(w2.y1+w2.y2)/2)<alt*.65) {
        l.ws.push(w2); l.y1=Math.min(l.y1,w2.y1); l.y2=Math.max(l.y2,w2.y2);
        l.x1=Math.min(l.x1,w2.x1); l.x2=Math.max(l.x2,w2.x2); used.add(j);
      }
    });
    l.ws.sort(function(a,b){return a.x1-b.x1;}); l.txt=l.ws.map(function(w){return w.t;}).join(" "); ls.push(l);
  });
  return ls.sort(function(a,b){return a.y1-b.y1;});
}

async function analisarNota(b64, mime) {
  var vrResp = await fetch("https://vision.googleapis.com/v1/images:annotate?key=" + VK, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({requests:[{image:{content:b64},features:[{type:"DOCUMENT_TEXT_DETECTION"}]}]})
  });
  if (!vrResp.ok) throw new Error("Vision HTTP " + vrResp.status);
  var vrJson = await vrResp.json();
  var vr = vrJson.responses && vrJson.responses[0];
  var txt = (vr && vr.fullTextAnnotation && vr.fullTextAnnotation.text) || "";
  var ws = extrairWords(vr);
  var ls = agruparLinhas(ws);
  if (!ws.length) throw new Error("Texto não detectado");
  var natH = Math.max.apply(null, ws.map(function(w){return w.y2;}).concat([1]));
  var nt = norm(txt);
  var tipo = nt.includes("nfce")||nt.includes("notafiscaldeconsumidor") ? "NFC-e"
    : nt.includes("danfe")||nt.includes("notafiscaleletronica") ? "NF-e"
    : nt.includes("nfse") ? "NFS-e"
    : nt.includes("rps")||nt.includes("reciboprovisorio") ? "RPS"
    : nt.includes("cupomfiscal") ? "Cupom"
    : nt.includes("comprovantevenda")||nt.includes("comprovante") ? "Comprovante"
    : nt.includes("recibo") ? "Recibo"
    : "Documento Fiscal";

  var dataR = extrairData(txt, ws, ls, natH);
  var numR = extrairNum(tipo, txt, ws, ls, natH);
  var valR = extrairVal(tipo, txt, ws, ls);

  // Claude fallback para recibos ou campos faltando
  var ehManuscrito = tipo==="Recibo" || tipo==="Documento Fiscal";
  if (!dataR || !valR || ehManuscrito) {
    try {
      var prompt = "Analise este documento fiscal brasileiro. Extraia DATA (DD/MM/AAAA), NUMERO da nota (so se campo explicito NF n, RPS, NFC-e n, Extrato N - NAO use Ticket, Seq, Controle, codigos com letras), VALOR TOTAL (campo R$). Responda JSON puro: {data:DD/MM/AAAA,numero:X,valor:R$ X,XX,data_ok:true,numero_ok:false,valor_ok:true}. Use null/false se nao encontrar.";
      var crResp = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":CK,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body: JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:200,messages:[{role:"user",content:[
          {type:"image",source:{type:"base64",media_type:mime,data:b64}},
          {type:"text",text:prompt}
        ]}]})
      });
      if (crResp.ok) {
        var crJson = await crResp.json();
        var crTxt = (crJson.content&&crJson.content[0]&&crJson.content[0].text)||"";
        crTxt = crTxt.replace(/```json|```/g,"").trim();
        var ct = JSON.parse(crTxt);
        if (!dataR&&ct.data_ok&&ct.data) dataR={v:ct.data,bbox:null};
        if (!numR&&ct.numero_ok&&ct.numero) numR={v:ct.numero,bbox:null};
        if (!valR&&ct.valor_ok&&ct.valor) valR={v:ct.valor,bbox:null};
      }
    } catch(e) { console.warn("Claude falhou:", e.message); }
  }

  return {
    tipo:tipo,
    data: dataR?dataR.v:null, numero: numR?numR.v:null, valor: valR?valR.v:null,
    dataBbox: dataR?dataR.bbox:null, numeroBbox: numR?numR.bbox:null, valorBbox: valR?valR.bbox:null,
    imgW: Math.max.apply(null,ws.map(function(w){return w.x2;}).concat([1])), imgH:natH
  };
}

function extrairData(txt, ws, ls, natH) {
  var reD = /\b(\d{2}[\/\-]\d{2}[\/\-]\d{2,4})\b/;
  var bad = ["validade","vencimento","permanencia","vigencia"];
  var dataLabs = ["dataehora","datadeemissao","dataaut","emissao","dataemissao","datahora","data:"];
  // 1. Com label
  for (var i=0;i<ls.length;i++) {
    var l=ls[i], n=norm(l.txt);
    if (bad.some(function(b){return n.includes(b);})) continue;
    if (!dataLabs.some(function(b){return n.includes(b);})) continue;
    var m=l.txt.match(reD);
    if (m&&anoOk(m[1])) { var w=l.ws.find(function(w){return reD.test(w.t)&&anoOk(w.t);})||l; return {v:fmtData(m[1]),bbox:{x1:w.x1,y1:w.y1,x2:w.x2,y2:w.y2}}; }
  }
  // 2. Superior com ano válido
  for (var i=0;i<ls.length;i++) {
    var l=ls[i];
    if (l.y1>natH*.70) continue;
    if (bad.some(function(b){return norm(l.txt).includes(b);})) continue;
    var m=l.txt.match(reD);
    if (m&&anoOk(m[1])) { var w=l.ws.find(function(w){return reD.test(w.t)&&anoOk(w.t);})||l; return {v:fmtData(m[1]),bbox:{x1:w.x1,y1:w.y1,x2:w.x2,y2:w.y2}}; }
  }
  // 3. Por extenso
  var nTxt = normS(txt).replace(/\n/g," ");
  var mE = nTxt.match(/(\d{1,2})\s+de\s+([a-z]+)\s+(?:de\s+)?(\d{2,4})/);
  if (mE) {
    var nm=mE[2].substring(0,4); var mes=MESES[mE[2]]||(Object.entries(MESES).find(function(kv){return kv[0].startsWith(nm);})||[null,null])[1];
    if (mes) { var ano=mE[3].length===2?"20"+mE[3]:mE[3]; if(anoOk("01/01/"+ano)) { var lDia=ls.find(function(l){return /\d{1,2}\s+de\s+/i.test(l.txt);}); return {v:mE[1].padStart(2,"0")+"/"+mes+"/"+ano,bbox:lDia?{x1:lDia.x1,y1:lDia.y1,x2:lDia.x2,y2:lDia.y2}:null}; } }
  }
  // 4. Fragmentada (Fortaleza,)
  for (var i=0;i<ls.length;i++) {
    var l=ls[i];
    if (!norm(l.txt).includes("fortaleza")&&!/\d{1,2}\s+\d{1,2}\s+\d{2,5}/.test(l.txt)) continue;
    var bloco = [l.txt,(ls[i+1]&&ls[i+1].txt)||""].join(" ").replace(/\b[1l](20\d{2})\b/g,"$1");
    var nums = bloco.replace(/[^\d\s]/g," ").trim().split(/\s+/).filter(function(n){return /^\d+$/.test(n);});
    for (var j=0;j<nums.length-1;j++) {
      var a=nums[j],b=nums[j+1],cc=nums[j+2]||"";
      if (a.length<=2&&b.length<=2&&(cc.length===4||cc.length===2)) {
        var d=parseInt(a),m=parseInt(b),ano=parseInt(cc.length===2?"20"+cc:cc);
        if (d>=1&&d<=31&&m>=1&&m<=12&&ano>=2000&&ano<=2030) { var lN=ls[i+1]; return {v:a.padStart(2,"0")+"/"+b.padStart(2,"0")+"/"+(cc.length===2?"20"+cc:cc),bbox:{x1:l.x1,y1:l.y1,x2:lN?Math.max(l.x2,lN.x2):l.x2,y2:lN?lN.y2:l.y2}}; }
      }
    }
  }
  // 5. Fallback
  for (var i=0;i<ls.length;i++) {
    var l=ls[i];
    if (bad.some(function(b){return norm(l.txt).includes(b);})) continue;
    var m=l.txt.match(reD);
    if (m&&anoOk(m[1])) { var w=l.ws.find(function(w){return reD.test(w.t)&&anoOk(w.t);})||l; return {v:fmtData(m[1]),bbox:{x1:w.x1,y1:w.y1,x2:w.x2,y2:w.y2}}; }
  }
  return null;
}

function extrairNum(tipo, txt, ws, ls, natH) {
  var bad = ["cpf","cnpj","cep","protocolo","autorizacao","chavedeacesso","versao","terminal","permanencia","validade","patio","fone","telefone","tributos","saldo","ticket","controle","seq0","seq:","seqnr"];
  function okN(t) { var d=t.replace(/[^0-9]/g,""); return d.length>=3&&d.length<=9&&d.length!==11&&d.length!==14; }
  if (tipo==="NF-e"||tipo==="NFS-e") {
    var m=txt.match(/N[º°][.\s]*(\d{3,9})\b/i)||txt.match(/N\.\s*(\d{3,9})\b/i);
    if (m&&okN(m[1])) { var nd=m[1]; var w=ws.find(function(w){return w.t.replace(/[^0-9]/g,"")===nd;}); return {v:nd,bbox:w?{x1:w.x1,y1:w.y1,x2:w.x2,y2:w.y2}:null}; }
  }
  var labs = ["nfcen","nfce","rps","nfse","nfs-e","opp","invoice","extrato","recibono","recion"];
  for (var i=0;i<ls.length;i++) {
    var l=ls[i], n=norm(l.txt);
    if (bad.some(function(b){return n.includes(b);})) continue;
    if (!labs.some(function(b){return n.includes(b);})) continue;
    var ws2=l.ws.filter(function(w){var d=w.t.replace(/[^0-9]/g,"").length;return d>=3&&d<=9&&d!==11&&d!==14&&/^[\d][\d.\-]*[\d]$/.test(w.t);});
    if (ws2.length) { var w=ws2[0]; var vn=w.t.replace(/\./g,"").replace(/^0+/,""); return {v:vn||w.t,bbox:{x1:w.x1,y1:w.y1,x2:w.x2,y2:w.y2}}; }
  }
  return null;
}

function extrairVal(tipo, txt, ws, ls) {
  var bad = ["identificacao","mov.","saldodevedor","desconto","troco","tributos"];
  function nV(t){return t.replace(/^R\$\s*/i,"").trim().replace(".",",");}
  function isOk(t){var v=nV(t);if(!v||v==="0,00"||v==="0.00"||v==="0")return false;return /\d+[,.]\d{2}/.test(v)||/^\d{1,6}$/.test(v);}
  function aV(l) {
    for(var i=0;i<l.ws.length-1;i++){if(/^R\$$/i.test(l.ws[i].t)){var n=l.ws[i+1];if(/\d/.test(n.t)&&isOk(n.t)){var a=l.ws[i];return {v:"R$ "+nV(n.t),bbox:{x1:a.x1,y1:Math.min(a.y1,n.y1),x2:n.x2,y2:Math.max(a.y2,n.y2)}};}}}
    var w1=l.ws.find(function(w){return /^R\$\d/.test(w.t);}); if(w1)return{v:"R$ "+nV(w1.t.replace(/^R\$/i,"")),bbox:{x1:w1.x1,y1:w1.y1,x2:w1.x2,y2:w1.y2}};
    var w2=l.ws.find(function(w){return /^\d+[,.]\d{2}$/.test(w.t)&&isOk(w.t);}); if(w2)return{v:"R$ "+nV(w2.t),bbox:{x1:w2.x1,y1:w2.y1,x2:w2.x2,y2:w2.y2}};
    return null;
  }
  if (tipo==="NF-e"||tipo==="NFS-e") {
    var m=txt.match(/[Vv][\s.]*[Tt]otal[\s\S]{0,40}?([\d]{1,3}(?:[.,][\d]{3})*[.,][\d]{2})/);
    if(m){var vStr=m[1],vNum=parseFloat(vStr.replace(/\./g,"").replace(",","."));if(vNum>0){var w=ws.find(function(w){return w.t.replace(/[^0-9]/g,"")===vStr.replace(/[^0-9]/g,"");});return{v:"R$ "+vStr,bbox:w?{x1:w.x1,y1:w.y1,x2:w.x2,y2:w.y2}:null};}}
  }
  var labs=["valortotal","totalapagar","valorapagar","valortotaldaos","totaldaos","totalpago","totalvenda","apagar","valor:","ticketpago","total:","quantia","totestadia","totestacion"];
  for(var i=0;i<ls.length;i++){var l=ls[i],n=norm(l.txt);if(bad.some(function(b){return n.includes(b);}))continue;var tem=labs.some(function(b){return n.includes(b);});var srcs=tem?[l,ls[i+1]].filter(Boolean):[l];for(var si=0;si<srcs.length;si++){var s=srcs[si];if(!s||bad.some(function(b){return norm(s.txt).includes(b);}))continue;var v=aV(s);if(v&&tem)return v;}}
  for(var i=0;i<ls.length;i++){var l=ls[i];if(/^R\$$/.test(l.txt.trim())&&ls[i+1]){var nx=ls[i+1];var m=nx.txt.trim().match(/^(\d+[,.]?\d*)$/);if(m&&parseFloat(m[1].replace(",","."))>0){var v2=m[1].includes(",")||m[1].includes(".")?m[1]:m[1]+",00";return{v:"R$ "+v2,bbox:{x1:Math.min(l.x1,nx.x1),y1:l.y1,x2:Math.max(l.x2,nx.x2),y2:nx.y2}};}}for(var wi=0;wi<l.ws.length-1;wi++){if(/^R\$$/i.test(l.ws[wi].t)&&/^\d+$/.test((l.ws[wi+1]&&l.ws[wi+1].t)||"")){var b2=l.ws[wi+1];if(parseInt(b2.t)>0)return{v:"R$ "+b2.t+",00",bbox:{x1:l.ws[wi].x1,y1:Math.min(l.ws[wi].y1,b2.y1),x2:b2.x2,y2:Math.max(l.ws[wi].y2,b2.y2)}};}}
  }
  for(var i=0;i<ls.length;i++){var l=ls[i];if(bad.some(function(b){return norm(l.txt).includes(b);}))continue;var v=aV(l);if(v)return v;}
  return null;
}

function gerarThumb(src, r, cb) {
  if (!r||(!r.dataBbox&&!r.numeroBbox&&!r.valorBbox)){cb(src);return;}
  var img=new Image(); img.onload=function(){
    var cv2=document.createElement("canvas"); cv2.width=img.naturalWidth; cv2.height=img.naturalHeight;
    var cx=cv2.getContext("2d"); cx.drawImage(img,0,0);
    [{bbox:r.dataBbox,cor:"#00e5a0"},{bbox:r.numeroBbox,cor:"#7b5cff"},{bbox:r.valorBbox,cor:"#ff6b35"}].forEach(function(item){
      if(!item.bbox)return;
      var x1=item.bbox.x1,y1=item.bbox.y1,x2=item.bbox.x2,y2=item.bbox.y2,w=x2-x1,h=y2-y1,p=Math.max(2,h*.12);
      cx.save(); cx.globalCompositeOperation="multiply"; cx.fillStyle=item.cor+"CC";
      cx.beginPath(); cx.roundRect(x1-p,y1-p,w+p*2,h+p*2,3); cx.fill();
      cx.globalCompositeOperation="source-over"; cx.strokeStyle=item.cor; cx.lineWidth=Math.max(1.5,img.naturalWidth*.002);
      cx.beginPath(); cx.roundRect(x1-p,y1-p,w+p*2,h+p*2,3); cx.stroke(); cx.restore();
    });
    cb(cv2.toDataURL("image/jpeg",.92));
  }; img.src=src;
}

function renderTabela() {
  tbody.innerHTML="";
  var com=notas.filter(function(n){return n.status==="ok"||n.status==="err";});
  if(!com.length){tabelaWrap.style.display="none";resVazio.style.display="flex";return;}
  tabelaWrap.style.display="block"; resVazio.style.display="none";
  com.forEach(function(n,i){
    var tr=document.createElement("tr");
    if(n.status==="ok"){
      var r=n.res;
      tr.innerHTML='<td id="td-'+i+'"><img class="tm" src="'+n.thumb+'" title="Ver"></td>'
        +'<td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="'+n.nome+'">'+n.nome+'</td>'
        +'<td><span class="tb">'+r.tipo+'</span></td>'
        +'<td class="'+(r.data?"vok":"vno")+'">'+(r.data||"—")+'</td>'
        +'<td class="'+(r.numero?"vok":"vno")+'">'+(r.numero||"—")+'</td>'
        +'<td class="'+(r.valor?"vok":"vno")+'">'+(r.valor||"—")+'</td>'
        +'<td><span class="badge ok">&#10003; ok</span></td>'
        +'<td style="display:flex;gap:4px;"><button class="btn-dl" id="dl-'+i+'">&#11015;</button><button class="btn-dl" id="ed-'+i+'" style="font-size:11px;">&#9998;</button></td>';
      tbody.appendChild(tr);
      (function(nota,idx){
        gerarThumb(nota.thumb,nota.res,function(url){
          nota._thumb=url;
          var td=document.getElementById("td-"+idx);
          if(td){var img=td.querySelector("img");if(img){img.src=url;img.onclick=function(){verModal(url);};}}
          var dl=document.getElementById("dl-"+idx); if(dl)dl.onclick=function(){baixar(url,nota.nome);};
          var ed=document.getElementById("ed-"+idx); if(ed)ed.onclick=function(){abrirEdit(nota,idx);};
        });
      })(n,i);
    } else {
      tr.innerHTML='<td><img class="tm" src="'+n.thumb+'"></td><td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+n.nome+'</td><td>—</td><td>—</td><td>—</td><td style="color:#ff6b35;font-size:11px;">'+(n.erro||"Erro").substring(0,25)+'</td><td><span class="badge er">&#10005; erro</span></td><td></td>';
      tbody.appendChild(tr);
    }
  });
  aba(1);
}

function verModal(url){document.getElementById("modalImg").src=url;document.getElementById("modal").classList.add("on");}
function fecharModal(){document.getElementById("modal").classList.remove("on");document.getElementById("modalImg").src="";}
function baixar(url,nome){var a=document.createElement("a");a.href=url;a.download=(nome.replace(/\.[^.]+$/,"")||"nota")+"_anotada.jpg";document.body.appendChild(a);a.click();a.remove();}
function abrirEdit(nota,idx){_editNota=nota;_editIdx=idx;document.getElementById("editImg").src=nota.thumb;document.getElementById("editData").value=nota.res&&nota.res.data||"";document.getElementById("editNum").value=nota.res&&nota.res.numero||"";document.getElementById("editVal").value=nota.res&&nota.res.valor||"";document.getElementById("modalEdit").classList.add("on");}
function fecharEdit(){document.getElementById("modalEdit").classList.remove("on");_editNota=null;_editIdx=null;}
function salvarEdit(){if(!_editNota)return;var data=document.getElementById("editData").value.trim(),num=document.getElementById("editNum").value.trim(),val=document.getElementById("editVal").value.trim();if(data)_editNota.res.data=data;if(num)_editNota.res.numero=num;if(val)_editNota.res.valor=val;var tr=document.getElementById("td-"+_editIdx)&&document.getElementById("td-"+_editIdx).closest("tr");if(tr){var tds=tr.querySelectorAll("td");if(tds[3])tds[3].textContent=_editNota.res.data||"—";if(tds[4])tds[4].textContent=_editNota.res.numero||"—";if(tds[5])tds[5].textContent=_editNota.res.valor||"—";[3,4,5].forEach(function(i){if(tds[i])tds[i].className=tds[i].textContent!=="—"?"vok":"vno";});}fecharEdit();}
async function baixarTodas(){var ok=notas.filter(function(n){return n.status==="ok";});if(!ok.length){alert("Nenhuma nota processada.");return;}for(var i=0;i<ok.length;i++){var n=ok[i];await new Promise(function(resolve){function dl(url){baixar(url,n.nome);setTimeout(resolve,500);}if(n._thumb)dl(n._thumb);else gerarThumb(n.thumb,n.res,dl);});}}
function exportCSV(){var ok=notas.filter(function(n){return n.status==="ok";});if(!ok.length)return;var rows=[["Arquivo","Tipo","Data","Número","Valor"]].concat(ok.map(function(n){return[n.nome,n.res.tipo||"",n.res.data||"",n.res.numero||"",n.res.valor||""];}));var csv=rows.map(function(r){return r.map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(",");}).join("\n");var a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"}));a.download="notas_fiscais.csv";a.click();}
function copiarJSON(){navigator.clipboard.writeText(JSON.stringify(notas.filter(function(n){return n.status==="ok";}).map(function(n){return{arquivo:n.nome,tipo:n.res.tipo,data:n.res.data,numero:n.res.numero,valor:n.res.valor};}),null,2)).then(function(){alert("JSON copiado!");});}
